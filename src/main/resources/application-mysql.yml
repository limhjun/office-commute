# 로컬 MySQL 검증용 설정
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/office_commute?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:office_user}
    password: ${DB_PASSWORD:office_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true
        use_sql_comments: true

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    baseline-on-migrate: true

decorator:
  datasource:
    p6spy:
      enable-logging: true
      multiline: true
      logging: slf4j
      log-format: "Hibernate: %(sql)"

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type: trace
    org.springframework.security: debug
    p6spy: info
    com.company.officecommute: debug
    root: info

public:
  data:
    api:
      serviceKey: ${PUBLIC_API_SERVICE_KEY}
      url: ${PUBLIC_API_URL:http://apis.data.go.kr/B090041/openapi/service/SpcdeInfoService/getRestDeInfo}
