openapi: 3.0.3
info:
  title: Office Commute API
  description: |
    사내 출퇴근/근태/연차/조직 관리 시스템 API.
    모든 응답 오류는 `ErrorResult { code, message }` 또는
    `ValidationErrorResult { code, message, fieldErrorResults }` 형식을 따른다.
  version: 0.0.1

servers:
  - url: http://localhost:8080
    description: 로컬 개발

tags:
  - name: Auth
    description: 로그인/로그아웃 (세션 기반)
  - name: Team
    description: 팀 등록/조회
  - name: Employee
    description: 직원 등록/조회/팀 변경
  - name: Commute
    description: 출퇴근 시간 기록 및 월별 근무 시간 조회
  - name: AnnualLeave
    description: 연차 신청 및 잔여 연차 조회
  - name: OverTime
    description: 초과근무 조회/공휴일 동기화/Excel 리포트

# ----------------------------------------------------------------------
# 권한 모델 (참고)
# - 세션 기반 인증. `JSESSIONID` 쿠키로 식별.
# - `ManagerOnly` 표시된 엔드포인트는 currentRole=MANAGER 만 접근.
# - 비로그인: 401 UNAUTHORIZED. 로그인했으나 권한 부족: 403 FORBIDDEN.
# ----------------------------------------------------------------------
security:
  - SessionAuth: []

paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      description: |
        성공 시 새 HTTP 세션을 생성하고 `currentEmployeeId`, `currentRole`을 저장한다.
        기존 세션은 무효화된다(session fixation 방어).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { description: 로그인 성공. 응답 본문 없음. Set-Cookie로 JSESSIONID 발급. }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401':
          description: 이메일 미존재 또는 비밀번호 불일치
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResult' }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      description: 현재 세션을 무효화한다. 세션이 없어도 200으로 처리한다.
      security: []
      responses:
        '200': { description: 로그아웃 처리됨. 응답 본문 없음. }

  /team:
    post:
      tags: [Team]
      summary: 팀 등록 (Manager Only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TeamRegisterRequest' }
      responses:
        '200': { description: 등록됨. 응답 본문 없음. }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: 동일 이름의 팀이 이미 존재 (TEAM_ALREADY_EXISTS)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResult' }
    get:
      tags: [Team]
      summary: 팀 전체 조회
      description: |
        `memberCount`는 저장된 카운터가 아니라 `employee.team_id`의 COUNT 결과를 응답 시점에 합성한 값이다.
      responses:
        '200':
          description: 팀 목록
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TeamFindResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /employee:
    post:
      tags: [Employee]
      summary: 직원 등록 (Manager Only)
      description: |
        `teamId`는 옵셔널. 없으면 미배정 직원으로 저장.
        `password`는 BCrypt로 인코딩되어 저장된다.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmployeeSaveRequest' }
      responses:
        '201':
          description: 등록 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmployeeRegisterResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: teamId가 존재하지 않음 (TEAM_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResult' }
        '409':
          description: employeeCode 또는 email 중복 (EMPLOYEE_ALREADY_EXISTS)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResult' }
    get:
      tags: [Employee]
      summary: 직원 전체 조회 (Manager Only)
      responses:
        '200':
          description: 직원 목록. 미배정 직원은 `teamId`/`teamName`이 null.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/EmployeeFindResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /employee/{employeeId}/team:
    put:
      tags: [Employee]
      summary: 직원 팀 변경 (Manager Only)
      description: |
        `teamId`가 null이면 미배정 상태로 변경.
      parameters:
        - in: path
          name: employeeId
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmployeeChangeTeamRequest' }
      responses:
        '200': { description: 변경됨 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: |
            employeeId 또는 teamId 미존재.
            코드: `EMPLOYEE_NOT_FOUND` 또는 `TEAM_NOT_FOUND`
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResult' }

  /commute:
    post:
      tags: [Commute]
      summary: 출근 등록
      description: 현재 로그인 직원의 출근 시각을 서버 시각으로 기록.
      responses:
        '200': { description: 기록됨. 응답 본문 없음. }
        '400':
          description: |
            제약 위반.
            - DUPLICATE_WORK: 이미 오늘 출근 등록함
            - DATA_INTEGRITY_ERROR: 기타 데이터 제약 위반
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResult' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      tags: [Commute]
      summary: 퇴근 등록
      description: 현재 로그인 직원의 퇴근 시각을 서버 시각으로 기록.
      responses:
        '200': { description: 기록됨. 응답 본문 없음. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    get:
      tags: [Commute]
      summary: 월별 근무 시간 조회
      description: 현재 로그인 직원의 특정 년/월 근무 시간을 일자별 + 합계로 반환.
      parameters:
        - in: query
          name: yearMonth
          required: true
          schema: { type: string, example: "2024-08" }
          description: ISO yyyy-MM
      responses:
        '200':
          description: 월별 근무 시간
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkDurationPerDateResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /annual-leave:
    post:
      tags: [AnnualLeave]
      summary: 연차 신청 (현재 로그인 직원)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AnnualLeaveEnrollRequest' }
      responses:
        '200':
          description: 등록된 연차 목록
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AnnualLeaveEnrollmentResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    get:
      tags: [AnnualLeave]
      summary: 잔여 연차 조회 (현재 로그인 직원)
      responses:
        '200':
          description: 잔여 연차
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnnualLeaveGetRemainingResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /overtime:
    get:
      tags: [OverTime]
      summary: 월별 초과근무 계산 (Manager Only)
      parameters:
        - $ref: '#/components/parameters/YearMonthQuery'
      responses:
        '200':
          description: 직원별 초과근무 분
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/OverTimeCalculateResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503':
          description: 공휴일 데이터 미가용 (HOLIDAY_DATA_UNAVAILABLE)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResult' }

  /overtime/holiday-status:
    get:
      tags: [OverTime]
      summary: 공휴일 캐시 상태 조회 (Manager Only)
      parameters:
        - $ref: '#/components/parameters/YearMonthQuery'
      responses:
        '200':
          description: 캐시 상태
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HolidayCacheStatusResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /overtime/holiday-sync:
    post:
      tags: [OverTime]
      summary: 공휴일 캐시 강제 동기화 (Manager Only)
      parameters:
        - $ref: '#/components/parameters/YearMonthQuery'
      responses:
        '200':
          description: 동기화 후 캐시 상태
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HolidayCacheStatusResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /overtime/report/excel:
    get:
      tags: [OverTime]
      summary: 월별 초과근무 Excel 리포트 다운로드 (Manager Only)
      parameters:
        - $ref: '#/components/parameters/YearMonthQuery'
      responses:
        '200':
          description: |
            xlsx 바이너리.
            Content-Disposition: `attachment; filename*=UTF-8''YYYY년M월_초과근무보고서.xlsx`
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: { type: string, format: binary }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    SessionAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID

  parameters:
    YearMonthQuery:
      in: query
      name: yearMonth
      required: true
      schema: { type: string, example: "2024-08" }
      description: ISO yyyy-MM

  responses:
    BadRequest:
      description: 잘못된 요청 (BAD_REQUEST / INVALID_JSON / DUPLICATE_WORK 등)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResult' }
    ValidationError:
      description: 입력값 검증 실패 (VALIDATION_ERROR)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ValidationErrorResult' }
    Unauthorized:
      description: 비로그인 (UNAUTHORIZED)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResult' }
    Forbidden:
      description: 권한 부족 (FORBIDDEN)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResult' }

  schemas:
    # ---- Common ----
    ErrorResult:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: |
            에러 코드. 예시:
            - BAD_REQUEST, INVALID_JSON, INVALID_PARAMETER, MISSING_PARAMETER
            - UNAUTHORIZED, FORBIDDEN
            - TEAM_ALREADY_EXISTS, EMPLOYEE_ALREADY_EXISTS
            - TEAM_NOT_FOUND, EMPLOYEE_NOT_FOUND
            - DUPLICATE_WORK, DATA_INTEGRITY_ERROR
            - HOLIDAY_DATA_UNAVAILABLE
            - INTERNAL_SERVER_ERROR
        message: { type: string }
    FieldErrorResult:
      type: object
      required: [field, message]
      properties:
        field: { type: string }
        message: { type: string }
    ValidationErrorResult:
      type: object
      required: [code, message, fieldErrorResults]
      properties:
        code: { type: string, example: VALIDATION_ERROR }
        message: { type: string, example: 입력값이 올바르지 않습니다 }
        fieldErrorResults:
          type: array
          items: { $ref: '#/components/schemas/FieldErrorResult' }

    Role:
      type: string
      enum: [MANAGER, MEMBER]

    # ---- Auth ----
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    # ---- Team ----
    TeamRegisterRequest:
      type: object
      required: [teamName]
      properties:
        teamName: { type: string }
        managerName:
          type: string
          nullable: true
          description: 옵셔널. 빈 문자열은 null로 정규화됨.
    TeamFindResponse:
      type: object
      required: [teamId, name, memberCount]
      properties:
        teamId: { type: integer, format: int64 }
        name: { type: string }
        managerName: { type: string, nullable: true }
        memberCount:
          type: integer
          format: int64
          description: employee.team_id COUNT 파생값.

    # ---- Employee ----
    EmployeeSaveRequest:
      type: object
      required: [name, role, birthday, workStartDate, employeeCode, email, password]
      properties:
        name: { type: string, description: 직원 이름 }
        role: { $ref: '#/components/schemas/Role' }
        birthday:
          type: string
          format: date
          description: 과거 날짜
        workStartDate:
          type: string
          format: date
          description: 오늘 또는 과거 날짜
        employeeCode:
          type: string
          pattern: '^[A-Z0-9]{6,10}$'
          description: 사번 (대문자/숫자 6-10자)
        email: { type: string, format: email }
        password:
          type: string
          minLength: 8
          description: 평문. 서버에서 BCrypt로 인코딩.
        teamId:
          type: integer
          format: int64
          nullable: true
          description: 옵셔널. 없으면 미배정.
    EmployeeRegisterResponse:
      type: object
      required: [employeeId]
      properties:
        employeeId: { type: integer, format: int64 }
    EmployeeFindResponse:
      type: object
      required: [employeeId, name, role, birthday, workStartDate]
      properties:
        employeeId: { type: integer, format: int64 }
        teamId: { type: integer, format: int64, nullable: true }
        teamName: { type: string, nullable: true }
        name: { type: string }
        role: { $ref: '#/components/schemas/Role' }
        birthday: { type: string, format: date }
        workStartDate: { type: string, format: date }
    EmployeeChangeTeamRequest:
      type: object
      properties:
        teamId:
          type: integer
          format: int64
          nullable: true
          description: null이면 미배정 상태로 변경.

    # ---- AnnualLeave ----
    AnnualLeaveEnrollRequest:
      type: object
      required: [wantedDates]
      properties:
        wantedDates:
          type: array
          items: { type: string, format: date }
          description: 미래 날짜 목록.
    AnnualLeaveEnrollmentResponse:
      type: object
      required: [annualLeaveId, enrolledDate]
      properties:
        annualLeaveId: { type: integer, format: int64 }
        enrolledDate: { type: string, format: date }
    AnnualLeave:
      type: object
      required: [id, employeeId, wantedDate]
      properties:
        id: { type: integer, format: int64 }
        employeeId: { type: integer, format: int64 }
        wantedDate: { type: string, format: date }
    AnnualLeaveGetRemainingResponse:
      type: object
      required: [employeeId, remainingLeaves]
      properties:
        employeeId: { type: integer, format: int64 }
        remainingLeaves:
          type: array
          items: { $ref: '#/components/schemas/AnnualLeave' }

    # ---- Commute ----
    CommuteDetail:
      type: object
      required: [date, usingDayOff]
      properties:
        date: { type: string, format: date }
        usingDayOff: { type: boolean }
    WorkDurationPerDateResponse:
      type: object
      required: [details, sumWorkingMinutes]
      properties:
        details:
          type: array
          items: { $ref: '#/components/schemas/CommuteDetail' }
        sumWorkingMinutes: { type: integer, format: int64 }

    # ---- OverTime ----
    OverTimeCalculateResponse:
      type: object
      required: [id, name, teamName, overTimeMinutes]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        teamName: { type: string, nullable: true }
        overTimeMinutes: { type: integer, format: int64 }
    HolidayCacheStatusResponse:
      type: object
      required: [yearMonth, cachedHolidayCount, cacheUsable, status]
      properties:
        yearMonth: { type: string, example: "2024-08" }
        cachedHolidayCount: { type: integer }
        cacheUsable: { type: boolean }
        status:
          type: string
          description: 캐시 상태 코드 (READY / EMPTY / STALE / SYNC_FAILED 등)
        reason: { type: string, nullable: true }
        lastSuccessfulSyncedAt:
          type: string
          format: date-time
          nullable: true
